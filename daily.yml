name: IndSight Daily News Update

on:
  schedule:
    - cron: '30 3 * * 1-5'   # Runs at 09:00 AM IST (03:30 UTC), Monday–Friday
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run news updater
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_news.py

      - name: Commit and push changes
        run: |
          git config user.name "IndSight Bot"
          git config user.email "indsight-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Daily news: $(date +'%d %b %Y')"
          git push
