name: IndSight Daily News Update

on:
  schedule:
    # Runs Mon–Fri at 09:00 IST (03:30 UTC)
    - cron: '30 3 * * 1-5'
  # Allows you to trigger manually from the Actions tab
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push the updated index.html

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run news updater
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_news.py

      # Git commit is here ONLY — the Python script does NOT do git commands
      - name: Commit and push updated index.html
        run: |
          git config user.name  "IndSight Bot"
          git config user.email "indsight-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Daily news: $(date +'%d %b %Y')"
          git push
