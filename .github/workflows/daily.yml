name: IndSight Daily News Update

on:
  schedule:
    # Runs at 9:00 AM IST (3:30 AM UTC) every weekday Mon–Fri
    - cron: '30 3 * * 1-5'
  workflow_dispatch:   # Manual trigger from GitHub Actions tab anytime

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run news updater
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_news.py

      - name: Commit and push updated index.html
        run: |
          git config user.name  "IndSight Bot"
          git config user.email "indsight-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet \
            && echo "No changes to commit — news already current" \
            || (git commit -m "Daily news: $(TZ='Asia/Kolkata' date +'%d %b %Y %H:%M IST')" && git push)
