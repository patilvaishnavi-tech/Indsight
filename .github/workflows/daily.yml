name: IndSight Daily Data Update

on:
  schedule:
    # 03:30 UTC = 09:00 IST, Mon–Fri (after Asian close / before India open)
    - cron: '30 3 * * 1-5'
    # Optional second run after NSE close (10:30 UTC = 16:00 IST) for EOD indices
    - cron: '30 10 * * 1-5'
  workflow_dispatch:        # allow manual runs from the Actions tab

# Prevent overlapping runs from racing on the same commit
concurrency:
  group: indsight-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # required to push the JSON commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show run context
        run: |
          echo "Run at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Trigger: ${{ github.event_name }}"
          echo "Gemini key present: ${{ secrets.GEMINI_API_KEY != '' }}"

      - name: Run data pipeline
        id: pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -o pipefail
          python update_news.py 2>&1 | tee pipeline.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Verify JSON outputs are valid
        run: |
          echo "── Validating generated JSON ──"
          for f in data/news.json data/markets.json data/commodities.json data/history.json; do
            if [ ! -f "$f" ]; then
              echo "❌ MISSING: $f"; exit 1
            fi
            python -c "import json,sys; json.load(open('$f')); print('✅ valid:', '$f')" || exit 1
          done
          echo "── Version stamp ──"
          cat data/version.txt && echo ""

      - name: Commit and push only if data changed
        run: |
          git config user.name  "IndSight Bot"
          git config user.email "indsight-bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "ℹ️  No data changes this run — nothing to commit."
          else
            echo "── Files changed ──"
            git diff --staged --name-only
            git commit -m "Data update: $(date -u +'%d %b %Y %H:%M UTC')"
            # Pull-rebase in case the second daily run collides with the first
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "✅ Pushed updated data."
          fi

      - name: Upload pipeline log (always, for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_id }}
          path: pipeline.log
          retention-days: 7
